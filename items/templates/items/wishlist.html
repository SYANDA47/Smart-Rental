{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2><i class="fas fa-heart"></i> My Wishlist</h2>
  <div class="row">
    {% for fav in favorites %}
      <div class="col-md-4">
        <div class="card shadow-sm mb-3">
          <img src="{{ fav.item.image.url }}" class="card-img-top" alt="{{ fav.item.name }}">
          <div class="card-body text-center">
            <h5 class="card-title">{{ fav.item.name }}</h5>
            <p class="card-text">{{ fav.item.description|truncatewords:15 }}</p>
            <a href="{% url 'remove_from_wishlist' fav.item.id %}" class="btn btn-danger btn-sm">
              <i class="fas fa-trash"></i> Remove
            </a>
          </div>
        </div>
      </div>
    {% empty %}
      <p>You have no items in your wishlist yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
